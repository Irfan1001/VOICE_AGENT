<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>IST University Voice Agent</title>
	<style>
		:root {
			--bg: #eef3eb;
			--panel: rgba(255, 255, 255, 0.86);
			--ink: #102417;
			--muted: #5e6f63;
			--brand: #0b6b3c;
			--brand-dark: #084628;
			--danger: #a62d2d;
			--line: rgba(16, 36, 23, 0.12);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			background:
				radial-gradient(circle at top, rgba(11, 107, 60, 0.18), transparent 30%),
				linear-gradient(160deg, #f6faf4 0%, #e7efe7 100%);
			color: var(--ink);
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 24px;
		}

		.shell {
			width: min(760px, 100%);
			background: var(--panel);
			backdrop-filter: blur(14px);
			border: 1px solid var(--line);
			border-radius: 28px;
			box-shadow: 0 22px 70px rgba(8, 70, 40, 0.12);
			overflow: hidden;
		}

		.hero {
			padding: 28px 28px 18px;
			background: linear-gradient(135deg, rgba(11, 107, 60, 0.96), rgba(5, 54, 32, 0.96));
			color: #f6fff8;
		}

		.hero h1 {
			margin: 0;
			font-size: clamp(1.8rem, 4vw, 2.6rem);
			line-height: 1.05;
			letter-spacing: 0.03em;
			text-transform: uppercase;
		}

		.hero p {
			margin: 10px 0 0;
			max-width: 52ch;
			color: rgba(246, 255, 248, 0.82);
		}

		.content {
			padding: 22px 24px 24px;
			display: grid;
			gap: 18px;
		}

		.panel {
			border: 1px solid var(--line);
			border-radius: 20px;
			padding: 18px;
			background: rgba(255, 255, 255, 0.8);
		}

		.metrics {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
			gap: 12px;
		}

		.metric-label {
			font-size: 0.8rem;
			text-transform: uppercase;
			letter-spacing: 0.08em;
			color: var(--muted);
		}

		.metric-value {
			margin-top: 6px;
			font-size: 1rem;
			font-weight: 700;
		}

		.controls {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
		}

		button {
			border: 0;
			border-radius: 999px;
			padding: 14px 20px;
			font-size: 0.98rem;
			font-weight: 700;
			cursor: pointer;
			transition: transform 120ms ease, opacity 120ms ease, box-shadow 120ms ease;
		}

		button:hover:not(:disabled) {
			transform: translateY(-1px);
		}

		button:disabled {
			opacity: 0.45;
			cursor: not-allowed;
		}

		.call-btn {
			background: var(--brand);
			color: white;
			box-shadow: 0 12px 24px rgba(11, 107, 60, 0.22);
		}

		.end-btn {
			background: #ffe9e9;
			color: var(--danger);
		}

		.vad-pill {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			padding: 10px 14px;
			border-radius: 999px;
			background: rgba(16, 36, 23, 0.06);
			font-weight: 600;
		}

		.vad-dot {
			width: 12px;
			height: 12px;
			border-radius: 50%;
			background: #b9c7bc;
			transition: background 120ms ease, box-shadow 120ms ease;
		}

		.vad-dot.active {
			background: #18b05c;
			box-shadow: 0 0 0 8px rgba(24, 176, 92, 0.14);
		}

		.transcript-list {
			display: grid;
			gap: 12px;
			max-height: 380px;
			overflow: auto;
		}

		.message {
			padding: 14px 16px;
			border-radius: 16px;
			line-height: 1.45;
			font-size: 0.97rem;
		}

		.message.user {
			background: #edf6ef;
			border: 1px solid rgba(11, 107, 60, 0.12);
		}

		.message.bot {
			background: #fff8eb;
			border: 1px solid rgba(163, 113, 18, 0.12);
		}

		.message small {
			display: block;
			margin-bottom: 6px;
			font-size: 0.76rem;
			letter-spacing: 0.06em;
			text-transform: uppercase;
			color: var(--muted);
		}

		@media (max-width: 640px) {
			body {
				padding: 14px;
			}

			.hero,
			.content {
				padding-left: 18px;
				padding-right: 18px;
			}
		}
	</style>
</head>
<body>
	<div class="shell">
		<section class="hero">
			<h1>IST UNIVERSITY VOICE AGENT</h1>
			<p>Start a live voice session for admissions and campus queries grounded in the IST knowledge base.</p>
		</section>

		<section class="content">
			<div class="metrics">
				<div class="panel">
					<div class="metric-label">Call Status</div>
					<div class="metric-value" id="status">Idle</div>
				</div>
				<div class="panel">
					<div class="metric-label">Connection</div>
					<div class="metric-value" id="connectionState">Disconnected</div>
				</div>
				<div class="panel">
					<div class="metric-label">Voice Activity</div>
					<div class="metric-value">
						<span class="vad-pill"><span id="vadDot" class="vad-dot"></span><span id="vadText">Waiting</span></span>
					</div>
				</div>
			</div>

			<div class="panel controls">
				<button id="dialBtn" class="call-btn">Dial a Call</button>
				<button id="hangupBtn" class="end-btn" disabled>End Call</button>
			</div>

			<div class="panel">
				<div class="metric-label">Conversation</div>
				<div id="transcriptList" class="transcript-list"></div>
			</div>
		</section>
	</div>


<script>
// -------------------------------------------------------------------------
// IST University Voice Agent — Frontend
// Simple architecture:
//   AudioWorklet (mic PCM16, 24 kHz)
//   ? WebSocket ? FastAPI ? OpenAI Realtime API
//   ? PCM16 audio chunks ? Realtime events
// VAD: 2 constants only — SPEECH_THRESHOLD and SILENCE_MS
// -------------------------------------------------------------------------

// -- AudioWorklet (inlined as Blob URL) ----------------------------------
const WORKLET_CODE = `
class MicProcessor extends AudioWorkletProcessor {
  constructor() { super(); this._buf = []; }
  process(inputs) {
    const ch = inputs[0]?.[0];
    if (!ch) return true;
    let sq = 0;
    const int16 = new Int16Array(ch.length);
    for (let i = 0; i < ch.length; i++) {
      const v = Math.max(-1, Math.min(1, ch[i]));
      int16[i] = v < 0 ? v * 0x8000 : v * 0x7FFF;
      sq += v * v;
    }
    const rms = Math.sqrt(sq / ch.length);
    this.port.postMessage({ buf: int16.buffer, rms }, [int16.buffer]);
    return true;
  }
}
registerProcessor("mic-proc", MicProcessor);
`;

// -- VAD settings — the only 2 values you ever need to tune --------------
const SPEECH_THRESHOLD = 0.015;  // RMS level that counts as speech
const SILENCE_MS       = 800;    // ms of quiet before committing utterance

// -- State ----------------------------------------------------------------
let ws           = null;
let audioCtx     = null;
let workletNode  = null;
let micStream    = null;
let callActive   = false;
let speechActive = false;
let silenceTimer = null;
let nextPlayAt   = 0;
let activeSrcs   = [];
let botBodyEl    = null;

// -- DOM refs -------------------------------------------------------------
const statusEl  = document.getElementById("status");
const connEl    = document.getElementById("connectionState");
const vadDotEl  = document.getElementById("vadDot");
const vadTextEl = document.getElementById("vadText");
const logEl     = document.getElementById("transcriptList");
const dialBtn   = document.getElementById("dialBtn");
const hangBtn   = document.getElementById("hangupBtn");

// -- Helpers --------------------------------------------------------------
function setStatus(t)  { statusEl.textContent  = t; }
function setConn(t)    { connEl.textContent     = t; }
function setVAD(on, t) {
vadDotEl.classList.toggle("active", on);
vadTextEl.textContent = t;
}

function addMsg(role, text) {
const wrap = document.createElement("div");
wrap.className = "message " + role;
const lbl  = document.createElement("small");
lbl.textContent = role === "user" ? "Caller" : "IST Agent";
const body = document.createElement("div");
body.textContent = text;
wrap.append(lbl, body);
logEl.append(wrap);
logEl.scrollTop = logEl.scrollHeight;
return body;
}

// -- PCM16 playback -------------------------------------------------------
function playPCM16(b64) {
if (!audioCtx || !b64) return;
const bytes  = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
const int16  = new Int16Array(bytes.buffer);
const buf    = audioCtx.createBuffer(1, int16.length, 24000);
const f32    = buf.getChannelData(0);
for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / 32768;

const src    = audioCtx.createBufferSource();
src.buffer   = buf;
src.connect(audioCtx.destination);
const t      = Math.max(audioCtx.currentTime + 0.01, nextPlayAt);
src.start(t);
nextPlayAt   = t + buf.duration;
activeSrcs.push(src);
src.onended  = () => { activeSrcs = activeSrcs.filter(s => s !== src); };
}

function stopPlayback() {
for (const s of activeSrcs) try { s.stop(0); } catch (_) {}
activeSrcs = [];
nextPlayAt = 0;
}

// -- VAD ------------------------------------------------------------------
function handleVAD(rms) {
if (rms > SPEECH_THRESHOLD) {
if (!speechActive) {
speechActive = true;
// Barge-in: user spoke while agent was speaking
if (activeSrcs.length > 0) {
stopPlayback();
if (ws && ws.readyState === WebSocket.OPEN)
ws.send(JSON.stringify({ type: "barge_in" }));
}
}
clearTimeout(silenceTimer);
silenceTimer = null;
setVAD(true, "Voice detected");
} else if (speechActive && !silenceTimer) {
// Start silence countdown
silenceTimer = setTimeout(() => {
speechActive = false;
silenceTimer = null;
setVAD(false, "Listening");
if (callActive && ws && ws.readyState === WebSocket.OPEN) {
ws.send(JSON.stringify({ type: "commit" }));
setStatus("Processing");
}
}, SILENCE_MS);
}
}

// -- Realtime event handler ------------------------------------------------
function handleEvent(ev) {
switch (ev.type) {
case "session.created":
case "session.updated":
setConn("Connected");
setStatus("Listening");
setVAD(false, "Listening");
break;

case "error":
setStatus("Error: " + (ev.error && ev.error.message ? ev.error.message : "unknown"));
break;

// User transcript (shown after utterance is committed)
case "conversation.item.input_audio_transcription.completed":
addMsg("user", ev.transcript || "");
break;

// Agent response starts
case "response.created":
setStatus("Speaking");
botBodyEl = addMsg("bot", "");
break;

// Agent audio chunk — play it
case "response.audio.delta":
if (ev.delta) playPCM16(ev.delta);
break;

// Agent transcript delta — update bubble in real time
case "response.audio_transcript.delta":
if (botBodyEl && ev.delta) {
botBodyEl.textContent += ev.delta;
logEl.scrollTop = logEl.scrollHeight;
}
break;

// Agent finished responding
case "response.done":
setStatus("Listening");
setVAD(false, "Listening");
botBodyEl = null;
break;
}
}

// -- Call lifecycle --------------------------------------------------------
async function startCall() {
dialBtn.disabled = true;
setStatus("Starting...");
setConn("Connecting");

try {
// AudioContext at 24 kHz — matches OpenAI Realtime PCM16 format
audioCtx = new AudioContext({ sampleRate: 24000 });
await audioCtx.resume();

// Mic stream
micStream = await navigator.mediaDevices.getUserMedia({
audio: {
channelCount: 1,
sampleRate: 24000,
echoCancellation: true,
noiseSuppression: true,
autoGainControl: true,
},
});

// Load AudioWorklet (inline blob — no separate file needed)
const blobUrl = URL.createObjectURL(
new Blob([WORKLET_CODE], { type: "application/javascript" })
);
await audioCtx.audioWorklet.addModule(blobUrl);
URL.revokeObjectURL(blobUrl);

// Wire: mic ? worklet ? WebSocket
workletNode = new AudioWorkletNode(audioCtx, "mic-proc");
audioCtx.createMediaStreamSource(micStream).connect(workletNode);

// WebSocket
const proto = location.protocol === "https:" ? "wss" : "ws";
ws = new WebSocket(`${proto}://${location.host}/ws`);
ws.binaryType = "arraybuffer";

ws.onopen = () => {
callActive = true;
hangBtn.disabled = false;
setConn("Connected");
setStatus("Connecting to agent...");
// Start streaming mic audio to the backend
workletNode.port.onmessage = ({ data: { buf, rms } }) => {
if (callActive && ws.readyState === WebSocket.OPEN) {
ws.send(buf);
handleVAD(rms);
}
};
};

ws.onmessage = ({ data }) => {
try { handleEvent(JSON.parse(data)); } catch (_) {}
};

ws.onerror   = () => { setConn("Error"); setStatus("Connection error"); endCall(); };
ws.onclose   = () => { if (callActive) endCall(); };

} catch (err) {
setStatus("Could not start: " + err.message);
setConn("Disconnected");
_cleanup();
dialBtn.disabled = false;
}
}

function endCall() {
callActive = false;
clearTimeout(silenceTimer);
silenceTimer = null;
speechActive = false;
stopPlayback();
_cleanup();
setStatus("Idle");
setConn("Disconnected");
setVAD(false, "Waiting");
dialBtn.disabled = false;
hangBtn.disabled  = true;
}

function _cleanup() {
if (workletNode) { try { workletNode.disconnect(); } catch (_) {} workletNode = null; }
if (micStream)   { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
if (audioCtx)    { audioCtx.close().catch(() => {}); audioCtx = null; }
if (ws)          { try { ws.close(); } catch (_) {} ws = null; }
nextPlayAt = 0;
botBodyEl  = null;
}

dialBtn.addEventListener("click", startCall);
hangBtn.addEventListener("click",  endCall);
</script>
</body>
</html>
